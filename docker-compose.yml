services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: .
      dockerfile: GLMS.API/Dockerfile
    container_name: glms-backend-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=GLMSDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    ports:
      - "5001:8080"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: GLMS.Web/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ApiBaseUrl: "http://glms-backend-api:8080/"
    ports:
      - "5000:8080"
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge