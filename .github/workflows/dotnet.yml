name: GLMS Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore GLMS.slnx

      - name: Build solution
        run: dotnet build GLMS.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test GLMS.slnx --no-build --configuration Release